# exam_online/pytest.ini
[pytest]
DJANGO_SETTINGS_MODULE = exam_online.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Thư mục gốc — pytest tự tìm đệ quy vào các subfolder (auth/, quiz/, fileset/, search/)
testpaths = exam/tests
addopts = --reuse-db -p no:warnings
