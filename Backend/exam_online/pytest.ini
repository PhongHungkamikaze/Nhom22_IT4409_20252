# exam_online/pytest.ini
[pytest]
DJANGO_SETTINGS_MODULE = exam_online.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Thư mục gốc — pytest tự tìm đệ quy vào tất cả subfolder
testpaths = exam/tests
addopts = -p no:warnings
# Để tăng tốc khi chạy lặp: uncomment dòng dưới (cần --create-db lần đầu)
# addopts = --reuse-db -p no:warnings
# Thêm pytest-mock support

